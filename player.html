<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FS表示</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-mode="player">
<main class="app">
  <header class="topbar">
    <div class="title">
      <h1>FS表示</h1>
      <p>GMが開示した進行値だけが表示されます。</p>
    </div>
    <div class="status">
      <span class="pill" id="room-pill">room: -</span>
      <span class="pill warn" id="sync-status">Firebase未接続</span>
    </div>
  </header>

  <div class="controls">
    <label>FS <select id="fs-select"></select></label>
  </div>

  <div class="layout">
    <section class="panel">
      <h2>開示済みFS</h2>
      <div class="scroll">
        <div class="fs-nav" id="fs-nav"></div>
      </div>
    </section>

    <section class="panel">
      <h2>FS内容</h2>
      <div class="scroll">
        <div id="setup-warning"></div>
        <div id="fs-detail"></div>
      </div>
    </section>
  </div>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
