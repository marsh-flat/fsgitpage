<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FS表示</title>
  <link rel="stylesheet" href="./styles.css?v=20260626-mastertxt">
</head>
<body data-mode="player">
<main class="app">
  <header class="topbar">
    <div class="title">
      <h1>FS表示</h1>
    </div>
    <div class="status">
      <span class="pill" id="room-pill">room: -</span>
      <span class="pill warn" id="sync-status">Firebase未接続</span>
    </div>
  </header>

  <div class="layout player-layout">
    <section class="panel">
      <h2>FS内容</h2>
      <div id="happening-panel"></div>
      <div class="scroll">
        <div id="setup-warning"></div>
        <div id="fs-detail"></div>
      </div>
    </section>
  </div>
</main>
<script type="module" src="./app.js?v=fs-82b0c387b921"></script>
</body>
</html>
